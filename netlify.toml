[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Short URLs
[[redirects]]
  from = "https://iso9001.qm-guru.de/"
  to = "https://iso9001.qm-guru.de/ki-berater.html"
  status = 301
  force = true

[[redirects]]
  from = "/audit"
  to = "/fragebogen.html"
  status = 301

[[redirects]]
  from = "/chat"
  to = "/ki-berater.html"
  status = 301

[[redirects]]
  from = "/report"
  to = "/gap-report.html"
  status = 301
